<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>InstaFex — OnFeX Technology</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810; --bg-deep: #03040a; --bg2: #0d0f1a; --bg3: #131726; --bg4: #1a1f33;
  --border: rgba(125,211,240,0.10); --border2: rgba(125,211,240,0.22);
  --text: #F5F5F0; --text2: #9CA3B8; --text3: #5C6378;
  --cyan: #6FCBEC; --cyan-bright: #9FE0F7; --cyan-dim: rgba(111,203,236,0.12);
  --good: #4ADE9C; --warn: #F0B25C; --bad: #F0625C;
  --r: 14px; --rsm: 10px;
  --serif: 'Fraunces', serif; --sans: 'Inter', -apple-system, sans-serif;
  --sidebar-w: 232px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; min-height: 100vh; }

/* ── GRID WATERMARK ── */
.grid-watermark {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: linear-gradient(rgba(111,203,236,0.022) 1px,transparent 1px), linear-gradient(90deg,rgba(111,203,236,0.022) 1px,transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse 70% 50% at 50% 0%,black 0%,transparent 70%);
}

/* ── APP SHELL ── */
.app-shell { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
  overflow-y: auto; overflow-x: hidden;
}
.sidebar-logo {
  padding: 18px 16px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.sidebar-brandmark {
  width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
  background: var(--bg-deep); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.sidebar-brandmark::before {
  content: ''; position: absolute; inset: 0;
  background-image: linear-gradient(rgba(111,203,236,0.5) 0.5px,transparent 0.5px), linear-gradient(90deg,rgba(111,203,236,0.5) 0.5px,transparent 0.5px);
  background-size: 5px 5px; transform: skewY(-6deg) scale(1.3); opacity: 0.5;
}
.sidebar-brandmark span { position: relative; font-family: var(--serif); font-weight: 700; font-size: 13px; color: var(--text); z-index: 1; }
.sidebar-logo-text { flex: 1; min-width: 0; }
.sidebar-logo-name { font-family: var(--serif); font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.1; }
.sidebar-logo-sub { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-top: 1px; }

.sidebar-nav { padding: 8px 0; flex: 1; }
.nav-group { margin-bottom: 2px; }
.nav-group-label {
  padding: 10px 16px 3px; font-size: 9.5px; font-weight: 700;
  color: var(--text3); text-transform: uppercase; letter-spacing: .09em;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; margin: 1px 6px; border-radius: 8px;
  font-size: 13px; color: var(--text2); font-weight: 500;
  cursor: pointer; transition: background .14s, color .14s;
  border: none; background: none; width: calc(100% - 12px);
  text-align: left; font-family: var(--sans); line-height: 1.2;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--cyan-dim); color: var(--cyan-bright); font-weight: 600; }
.nav-item.done { color: var(--text); }
.nav-item.done .ni-badge { display: inline-flex; }
.nav-icon { font-size: 15px; flex-shrink: 0; width: 22px; text-align: center; line-height: 1; }
.ni-label { flex: 1; }
.ni-badge {
  display: none; font-size: 8.5px; font-weight: 700;
  background: var(--good); color: var(--bg-deep);
  border-radius: 4px; padding: 1px 5px; flex-shrink: 0;
}

.sidebar-footer {
  padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-footer-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text2); font-size: 12.5px; font-weight: 500;
  cursor: pointer; font-family: var(--sans); transition: all .14s;
  margin-bottom: 5px;
}
.sidebar-footer-btn:hover { border-color: var(--border2); color: var(--text); }
.sidebar-footer-btn:last-child { margin-bottom: 0; }

/* ── MAIN WRAP ── */
.main-wrap { margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; flex: 1; }

/* ── TOPBAR ── */
.topbar {
  height: 58px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 14px;
  position: sticky; top: 0; z-index: 100; flex-shrink: 0;
}
.topbar-info { flex: 1; min-width: 0; }
.topbar-title { font-size: 14.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-sub { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-profile { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.topbar-avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  background: var(--bg4); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 13px; font-weight: 600; color: var(--cyan-bright);
  position: relative; overflow: hidden;
}
.topbar-avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.topbar-handle { font-size: 12.5px; font-weight: 600; color: var(--text2); }

/* ── PAGE CONTENT ── */
.page-content { padding: 24px; flex: 1; max-width: 860px; }

/* ── MOBILE HAMBURGER ── */
.mob-menu-btn {
  display: none; background: none; border: none; color: var(--text2);
  font-size: 20px; cursor: pointer; padding: 4px; flex-shrink: 0;
}
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 190; }
.sidebar-overlay.open { display: block; }

/* ── CARDS ── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 22px; margin-bottom: 14px; }
.card-title {
  font-size: 10.5px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
  color: var(--cyan); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.card-title::before { content: ''; width: 3px; height: 11px; background: var(--cyan); border-radius: 2px; display: inline-block; }

/* ── FORM ── */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 12px; color: var(--text2); font-weight: 500; }
.field input {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--rsm); color: var(--text); font-size: 15px; font-family: inherit;
  padding: 12px 14px; outline: none; transition: all .18s;
}
.field input:focus { border-color: var(--cyan); background: var(--bg4); box-shadow: 0 0 0 3px var(--cyan-dim); }
.field input::placeholder { color: var(--text3); }

/* ── BUTTONS ── */
.btn-main {
  width: 100%; padding: 15px; background: var(--text);
  color: var(--bg-deep); border: none; border-radius: var(--r);
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all .2s; margin-top: 6px; font-family: var(--sans);
}
.btn-main:hover { background: var(--cyan-bright); transform: translateY(-1px); }
.btn-main:active { transform: translateY(0); }
.btn-main:disabled { opacity: .35; cursor: not-allowed; }
.btn-s {
  flex: 1; padding: 11px 16px; border-radius: var(--rsm);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); font-size: 13.5px; font-weight: 600;
  cursor: pointer; transition: all .15s; font-family: var(--sans);
}
.btn-s:hover { border-color: var(--border2); color: var(--text); }
.btn-s.p { background: var(--text); border-color: var(--text); color: var(--bg-deep); }
.btn-s.p:hover { background: var(--cyan-bright); border-color: var(--cyan-bright); }

/* ── ERROR ── */
.err {
  background: rgba(240,98,92,.08); border: 1px solid rgba(240,98,92,.2);
  border-radius: var(--rsm); padding: 12px 16px;
  font-size: 13px; color: var(--bad); margin-top: 12px; display: none;
}

/* ── LOADING ── */
.loading-wrap { text-align: center; padding: 80px 20px 60px; }
.loader-orb { width: 80px; height: 80px; margin: 0 auto 28px; position: relative; }
.loader-orb svg { width: 100%; height: 100%; }
.loader-ring { fill:none; stroke:var(--cyan); stroke-width:1.4; opacity:.85; stroke-dasharray:4 230; stroke-linecap:round; transform-origin:50% 50%; animation:orbit 2.2s linear infinite; }
.loader-ring2 { fill:none; stroke:var(--cyan-bright); stroke-width:1; opacity:.4; stroke-dasharray:2 300; transform-origin:50% 50%; animation:orbit 3.4s linear infinite reverse; }
@keyframes orbit { to { transform: rotate(360deg); } }
.loader-core { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:8px; height:8px; border-radius:50%; background:var(--cyan-bright); box-shadow:0 0 18px 4px var(--cyan-dim); animation:pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{ opacity:.6; transform:translate(-50%,-50%) scale(1); } 50%{ opacity:1; transform:translate(-50%,-50%) scale(1.4); } }
.lmsg { font-family:var(--serif); font-size:17px; font-weight:500; color:var(--text); margin-bottom:8px; min-height:26px; transition:opacity .3s; }
.lsub { font-size:12px; color:var(--text3); letter-spacing:.04em; text-transform:uppercase; }
.loader-bar-bg { width:220px; height:3px; background:var(--bg4); border-radius:2px; margin:20px auto 0; overflow:hidden; }
.loader-bar-fill { height:100%; width:0%; background:var(--cyan); border-radius:2px; transition:width .4s ease-out; }
.loader-pct { font-family:var(--serif); font-size:13px; color:var(--cyan-bright); margin-top:10px; font-weight:500; }

/* ── INLINE LOADING ── */
.inline-load { display:flex; align-items:center; gap:12px; padding:20px 0; color:var(--text2); font-size:13px; }
.inline-spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── PROFILE HERO ── */
.profile-hero {
  display:flex; align-items:center; gap:18px;
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border); border-radius:var(--r);
  padding:24px; margin-bottom:14px; position:relative; overflow:hidden;
}
.profile-hero::after {
  content:''; position:absolute; top:-50%; right:-20%; width:260px; height:260px;
  background:radial-gradient(circle,rgba(111,203,236,.07),transparent 70%); pointer-events:none;
}
.avatar {
  width:58px; height:58px; border-radius:50%; flex-shrink:0;
  background:var(--bg-deep); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  font-family:var(--serif); font-size:22px; font-weight:600; color:var(--cyan-bright); z-index:1;
}
.pinfo { flex:1; min-width:0; position:relative; z-index:1; }
.pinfo .handle { font-family:var(--serif); font-size:20px; font-weight:600; letter-spacing:-.3px; }
.pinfo .sub { font-size:12.5px; color:var(--text2); margin-top:2px; }
.pinfo .badges { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.badge { padding:3px 9px; border-radius:7px; font-size:10.5px; font-weight:600; }
.ba { background:rgba(74,222,156,.12); color:var(--good); }
.bb { background:rgba(240,178,92,.12); color:var(--warn); }
.bn { background:var(--cyan-dim); color:var(--cyan-bright); }
.source-tag { display:inline-flex; align-items:center; gap:4px; background:rgba(74,222,156,.08); border:1px solid rgba(74,222,156,.18); color:var(--good); border-radius:7px; padding:3px 9px; font-size:10.5px; font-weight:600; }

/* ── SCORE BADGE ── */
.score-badge {
  flex-shrink:0; text-align:center; background:var(--bg3); border:1px solid var(--border2);
  border-radius:12px; padding:12px 16px; min-width:78px; position:relative; z-index:1;
}
.score-grade { font-family:var(--serif); font-size:32px; font-weight:700; line-height:1; margin-bottom:2px; }
.score-pts { font-size:9.5px; color:var(--text3); margin-top:3px; }
.score-bar-wrap { margin-top:6px; }
.score-bar-bg { height:4px; background:var(--bg4); border-radius:4px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }

/* ── METRICS GRID ── */
.mets { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
.met { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:16px; text-align:center; }
.met .v { font-family:var(--serif); font-size:24px; font-weight:600; }
.met .l { font-size:10px; color:var(--text3); margin-top:4px; letter-spacing:.04em; text-transform:uppercase; }

/* ── REVENUE CARD ── */
.revenue-card { background:linear-gradient(135deg,rgba(74,222,156,.07),var(--bg2)) !important; border-color:rgba(74,222,156,.22) !important; }
.revenue-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
.rev-box { background:var(--bg3); border-radius:10px; padding:14px; }
.rev-v { font-size:17px; font-weight:700; color:var(--good); line-height:1.2; }
.rev-l { font-size:11px; color:var(--text3); margin-top:3px; }

/* ── POSTS GRID THUMBS ── */
.posts-grid-thumb { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:12px; }
.post-thumb-card { position:relative; border-radius:9px; overflow:hidden; background:var(--bg3); aspect-ratio:1; border:1px solid var(--border); }
.post-thumb-card img { width:100%; height:100%; object-fit:cover; display:block; }
.post-thumb-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,.82)); padding:18px 6px 6px; }
.post-thumb-mets { font-size:10px; color:#fff; display:flex; gap:6px; }
.post-thumb-badge { position:absolute; top:5px; left:5px; background:rgba(0,0,0,.55); border-radius:4px; padding:2px 5px; font-size:8.5px; color:#fff; font-weight:600; text-transform:uppercase; }
.post-no-thumb { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px; text-align:center; color:var(--text3); font-size:11px; }

/* ── BIO BOX ── */
.bio-box { background:var(--bg3); border-left:2px solid var(--cyan); border-radius:0 var(--rsm) var(--rsm) 0; padding:16px; font-size:14px; color:var(--text); line-height:1.7; font-family:var(--serif); font-style:italic; }

/* ── TAGS / HASHTAGS ── */
.tag-chip { display:inline-block; background:var(--bg4); border:1px solid var(--border); border-radius:6px; padding:2px 8px; font-size:11px; color:var(--text2); margin:2px 3px 2px 0; }

/* ── OBS LIST ── */
.obs-list { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
.obs-i { display:flex; gap:8px; align-items:flex-start; font-size:13px; color:var(--text2); line-height:1.5; }
.obs-i .dotc { width:5px; height:5px; border-radius:50%; background:var(--cyan); flex-shrink:0; margin-top:7px; }

/* ── NEXT STEP BOX ── */
.next-step-box { background:var(--bg3); border:1px dashed var(--border2); border-radius:var(--r); padding:20px; text-align:center; margin-top:4px; }
.next-step-box .ns-t { font-size:13px; color:var(--text2); margin-bottom:12px; }

/* ── STAGE JUMP BUTTONS ── */
.stage-jumps { display:flex; gap:8px; flex-wrap:wrap; }
.sj-btn {
  flex:1; min-width:100px; padding:9px 10px; border-radius:10px;
  border:1px solid var(--border); background:var(--bg2); color:var(--text2);
  font-size:11.5px; font-weight:500; cursor:pointer; text-align:center;
  font-family:var(--sans); transition:border-color .15s, color .15s;
}
.sj-btn:hover { border-color:var(--cyan); color:var(--cyan); }

/* ── SECTION INTRO (locked state) ── */
.section-intro {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
  padding:40px 32px; text-align:center;
}
.section-intro-icon { font-size:40px; margin-bottom:16px; }
.section-intro-title { font-family:var(--serif); font-size:22px; font-weight:600; margin-bottom:8px; }
.section-intro-sub { font-size:13.5px; color:var(--text2); line-height:1.65; max-width:420px; margin:0 auto 24px; }
.section-checklist { text-align:left; max-width:340px; margin:0 auto 24px; display:flex; flex-direction:column; gap:8px; }
.section-checklist-item { display:flex; gap:10px; align-items:flex-start; font-size:13px; color:var(--text2); }
.sc-dot { width:18px; height:18px; border-radius:50%; background:var(--cyan-dim); color:var(--cyan-bright); font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }

/* ── AI ANALYSIS CARDS ── */
.ai-section { background:var(--bg3); border-radius:12px; padding:16px; margin-bottom:10px; }
.ai-section-title { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--cyan); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.ai-badge { padding:2px 9px; border-radius:20px; background:var(--bg4); font-size:11px; font-weight:700; }
.ai-resumo { font-size:13.5px; color:var(--text2); line-height:1.65; margin-bottom:10px; }
.ai-bullets { display:flex; flex-direction:column; gap:5px; padding-left:0; list-style:none; }
.ai-bullet { display:flex; gap:8px; align-items:flex-start; font-size:13px; color:var(--text2); line-height:1.5; }
.ai-bullet::before { content:'›'; color:var(--cyan); font-weight:700; flex-shrink:0; }
.opp-card { background:var(--bg4); border-left:3px solid var(--cyan); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
.opp-card:last-child { margin-bottom:0; }
.opp-card-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:3px; }
.opp-card-desc { font-size:12.5px; color:var(--text2); line-height:1.55; }

/* ── INSIGHTS METRICS ── */
.insights-mets { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
.ins-met { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
.ins-met .v { font-family:var(--serif); font-size:22px; font-weight:600; color:var(--text); }
.ins-met .l { font-size:9.5px; color:var(--text3); margin-top:3px; text-transform:uppercase; letter-spacing:.04em; }

/* ── COMPETITION ── */
.comp-grid { display:flex; flex-direction:column; gap:10px; }
.comp-card { background:var(--bg3); border-radius:var(--rsm); border:1px solid var(--border); padding:16px; display:flex; gap:14px; align-items:flex-start; }
.comp-rank { font-family:var(--serif); font-size:22px; font-weight:600; color:var(--border2); flex-shrink:0; width:30px; text-align:center; line-height:1; padding-top:3px; }
.comp-body { flex:1; }
.comp-handle { font-size:14.5px; font-weight:700; color:var(--text); margin-bottom:2px; }
.comp-handle a { color:inherit; text-decoration:none; }
.comp-handle a:hover { color:var(--cyan-bright); }
.comp-size { font-size:12px; color:var(--text3); margin-bottom:5px; }
.comp-tipo { font-size:12.5px; color:var(--text2); margin-bottom:8px; line-height:1.5; }
.comp-dif { font-size:12px; color:var(--cyan-bright); font-style:italic; margin-top:6px; }
.comp-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
.comp-tag { font-size:10.5px; padding:2px 7px; border-radius:6px; background:var(--cyan-dim); color:var(--cyan); font-weight:600; }
.comp-tag.bad { background:rgba(240,98,92,.08); color:var(--bad); }
.bench-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.bench-item { background:var(--bg3); border-radius:var(--rsm); padding:12px; }
.bench-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:4px; }

<script>
/* ────────────────── STATE ────────────────── */
let etapa1Data = null;
let etapa2Data = null;
let etapa3Data = null;
let finalReportData = null;
let quizAnswers = null;
let currentSection = 'coleta';
let loadMsgInterval, progressInterval;
let currentCalDay = 1, calendarData = [];

const SECTIONS = {
  coleta:       { title: 'Coleta Inicial de Dados',      sub: 'Levantamento público do perfil, métricas e posicionamento' },
  analise:      { title: 'Análise Profunda da Conta',    sub: 'Métricas internas via login oficial do Instagram' },
  concorrencia: { title: 'Análise de Concorrência',      sub: 'Mapeamento de mercado e diferenciais competitivos' },
  planejamento: { title: 'Planejamento Estratégico',     sub: 'Diagnóstico e criação do cronograma personalizado' },
  entrega:      { title: 'Entrega Final',                sub: 'Documento estratégico completo gerado pela IA OnFeX' }
};

/* ────────────────── UTILS ────────────────── */
function fmt(v) { return !v ? '0' : v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(1)+'k' : String(v); }
function sc_color(v) { return v >= 70 ? 'var(--good)' : v >= 40 ? 'var(--warn)' : 'var(--bad)'; }
function pclass(p) { return p === 'Alta' ? 'ph' : (p === 'Media' || p === 'Média') ? 'pm' : 'pl'; }

function calcEtapa1Score(p) {
  let score = 0;
  const eng = parseFloat(p.engagementRate) || 0;
  if (eng >= 6) score += 35; else if (eng >= 3) score += 28; else if (eng >= 1) score += 18; else if (eng >= 0.5) score += 10; else score += 3;
  const f = p.followersCount || 0;
  if (f >= 100000) score += 20; else if (f >= 50000) score += 16; else if (f >= 10000) score += 12; else if (f >= 5000) score += 8; else if (f >= 1000) score += 5; else score += 2;
  const cad = p.cadenceDays;
  if (!cad) score += 8; else if (cad <= 1) score += 20; else if (cad <= 2) score += 15; else if (cad <= 3) score += 10; else if (cad <= 7) score += 5; else score += 1;
  if (p.biography && p.biography.length > 80) score += 6; else if (p.biography && p.biography.length > 20) score += 3;
  if (p.externalUrl) score += 5;
  if (p.isVerified) score += 4;
  if ((p.highlightCount || 0) >= 8) score += 5; else if ((p.highlightCount || 0) >= 3) score += 3;
  const pc = p.postsCount || 0;
  if (pc >= 200) score += 5; else if (pc >= 50) score += 3; else if (pc >= 20) score += 1;
  const grade = score >= 85 ? 'A+' : score >= 75 ? 'A' : score >= 62 ? 'B' : score >= 48 ? 'C' : score >= 32 ? 'D' : 'F';
  const gradeColor = (grade === 'A+' || grade === 'A') ? '#4ADE9C' : grade === 'B' ? '#6FCBEC' : grade === 'C' ? '#F0B25C' : '#F0625C';
  return { score, grade, gradeColor };
}

function calcRevenue(followers, engRate) {
  const eng = parseFloat(engRate) || 0;
  const mult = eng >= 5 ? 1.5 : eng >= 3 ? 1.2 : eng >= 1 ? 1.0 : 0.6;
  let min, max;
  if (followers < 3000) { min=50; max=150; } else if (followers < 5000) { min=100; max=300; }
  else if (followers < 10000) { min=200; max=600; } else if (followers < 30000) { min=500; max=2000; }
  else if (followers < 100000) { min=1500; max=6000; } else if (followers < 500000) { min=5000; max=25000; }
  else { min=20000; max=100000; }
  const ppMin = Math.round(min * mult / 10) * 10;
  const ppMax = Math.round(max * mult / 10) * 10;
  return { ppMin, ppMax, mMin: ppMin * 4, mMax: ppMax * 8 };
}
function fmtMoney(n) { return n >= 1000 ? 'R$ ' + (n/1000).toFixed(n % 1000 === 0 ? 0 : 1)+'k' : 'R$ '+n; }

/* ────────────────── NAVIGATION ────────────────── */
function navigateTo(section) {
  closeSidebar();
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + section);
  if (navEl) navEl.classList.add('active');
  document.getElementById('topbar-title').textContent = SECTIONS[section].title;
  document.getElementById('topbar-sub').textContent = SECTIONS[section].sub;
  renderSection(section);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function markDone(section) {
  const el = document.getElementById('nav-' + section);
  if (el) el.classList.add('done');
}

function renderSection(section) {
  const content = document.getElementById('page-content');
  switch (section) {
    case 'coleta':       renderColetaSection(content); break;
    case 'analise':      renderAnaliseSection(content); break;
    case 'concorrencia': renderConcorrenciaSection(content); break;
    case 'planejamento': renderPlanejamentoSection(content); break;
    case 'entrega':      renderEntregaSection(content); break;
  }
}

function updateTopbarProfile(p) {
  if (!p) return;
  const el = document.getElementById('topbar-profile');
  const av = document.getElementById('topbar-avatar');
  const handle = document.getElementById('topbar-handle');
  const init = (p.username || '?').charAt(0).toUpperCase();
  av.textContent = init;
  if (p.profilePicUrl) {
    const img = document.createElement('img');
    img.src = `/api/proxy-pic?url=${encodeURIComponent(p.profilePicUrl)}`;
    img.onerror = () => img.remove();
    av.appendChild(img);
  }
  handle.textContent = '@' + (p.username || '');
  el.style.display = 'flex';
}

/* ────────────────── SIDEBAR MOBILE ────────────────── */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

/* ────────────────── LOADING ────────────────── */
const LOAD_MESSAGES = [
  'Coletando dados públicos do perfil',
  'Lendo biografia, destaques e publicações',
  'Mapeando métricas e presença digital',
  'Identificando posicionamento e comunicação'
];

function showLoadingInContent(msgs) {
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="loading-wrap">
      <div class="loader-orb">
        <svg viewBox="0 0 100 100">
          <circle class="loader-ring" cx="50" cy="50" r="42"></circle>
          <circle class="loader-ring2" cx="50" cy="50" r="34"></circle>
        </svg>
        <div class="loader-core"></div>
      </div>
      <div class="lmsg" id="load-msg">${(msgs||LOAD_MESSAGES)[0]}</div>
      <div class="lsub">OnFeX Technology® · Processando</div>
      <div class="loader-bar-bg"><div class="loader-bar-fill" id="loader-bar"></div></div>
      <div class="loader-pct" id="loader-pct">0%</div>
    </div>`;
  let i = 0;
  const msgList = msgs || LOAD_MESSAGES;
  clearInterval(loadMsgInterval);
  loadMsgInterval = setInterval(() => {
    i = (i + 1) % msgList.length;
    const el = document.getElementById('load-msg');
    if (!el) { clearInterval(loadMsgInterval); return; }
    el.style.opacity = 0;
    setTimeout(() => { if (el) { el.textContent = msgList[i]; el.style.opacity = 1; }}, 300);
  }, 2600);
  clearInterval(progressInterval);
  let elapsed = 0;
  progressInterval = setInterval(() => {
    elapsed += 0.4;
    const val = Math.min(96, 100 * (1 - Math.exp(-elapsed / 35)));
    const bar = document.getElementById('loader-bar');
    const pct = document.getElementById('loader-pct');
    if (!bar) { clearInterval(progressInterval); return; }
    bar.style.width = val.toFixed(0) + '%';
    pct.textContent = val.toFixed(0) + '%';
  }, 400);
}

function finishLoading() {
  clearInterval(loadMsgInterval);
  clearInterval(progressInterval);
  const bar = document.getElementById('loader-bar');
  const pct = document.getElementById('loader-pct');
  if (bar) bar.style.width = '100%';
  if (pct) pct.textContent = '100%';
}

function showErr(msg) {
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="card">
      <div class="err" style="display:block;">⚠ ${msg}</div>
      <button class="btn-main" style="margin-top:12px;" onclick="navigateTo('coleta')">← Voltar para Coleta</button>
    </div>`;

async function runColeta() {
  const username = document.getElementById('username')?.value?.trim();
  const niche = document.getElementById('niche')?.value?.trim();
  const errEl = document.getElementById('form-err');
  if (errEl) errEl.style.display = 'none';
  if (!username) { if (errEl) { errEl.textContent = '⚠ Informe o @ do Instagram.'; errEl.style.display = 'block'; } return; }
  if (!niche) { if (errEl) { errEl.textContent = '⚠ Informe o nicho do perfil.'; errEl.style.display = 'block'; } return; }

  showLoadingInContent(LOAD_MESSAGES);
  const handle = username.replace('@', '');
  let profile = null;

  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 100000);
    const res = await fetch('/api/apify', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: handle }), signal: ctrl.signal
    });
    clearTimeout(t);
    let data;
    try { data = await res.json(); } catch { throw new Error('Servidor não respondeu. Tente novamente.'); }
    if (!res.ok || data.error) throw new Error(data.error || 'Não foi possível obter dados do perfil.');
    profile = data;
  } catch (e) {
    finishLoading();
    renderColetaSection(document.getElementById('page-content'));
    const errEl2 = document.getElementById('form-err');
    if (errEl2) {
      errEl2.textContent = '⚠ ' + (e.name === 'AbortError' ? 'Timeout ao buscar dados. Tente novamente.' : e.message);
      errEl2.style.display = 'block';
    }
    return;
  }

  profile.niche = niche;
  if (profile.followersCount > 0 && profile.avgLikes > 0) {
    profile.engagementRate = (((profile.avgLikes + profile.avgComments) / profile.followersCount) * 100).toFixed(2);
  }

  let positioning = null;
  try {
    const posRes = await fetch('/api/positioning', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ profileData: profile })
    });
    const posData = await posRes.json();
    if (posRes.ok && !posData.error) positioning = posData;
  } catch {}

  finishLoading();
  etapa1Data = { profile, positioning };
  etapa3Data = null; quizAnswers = null; finalReportData = null;
  localStorage.setItem('instafex_etapa1', JSON.stringify(etapa1Data));
  markDone('coleta');
  updateTopbarProfile(profile);

  renderEtapa1Result(profile, positioning, document.getElementById('page-content'));
  maybeAutoLoadEtapa2();
}

function renderEtapa2Result(d, content) {

  const interactionsTotal = (series.total_interactions || []).reduce((a, v) => a + (v.value || 0), 0);
  const posts = d.posts || [];
  const avgLikes = posts.length ? Math.round(posts.reduce((a,p) => a+(p.likeCount||0),0)/posts.length) : 0;
  const avgComments = posts.length ? Math.round(posts.reduce((a,p) => a+(p.commentsCount||0),0)/posts.length) : 0;
  const avgSaved = posts.length ? Math.round(posts.reduce((a,p) => a+(p.saved||0),0)/posts.length) : 0;
  const engRate = d.followersCount > 0 && posts.length ? ((avgLikes + avgComments) / d.followersCount * 100).toFixed(2) : null;

  const topPosts = [...posts].sort((a,b) => (b.impressions||b.reach||0)-(a.impressions||a.reach||0)).slice(0,5);
  const topPostsHtml = topPosts.length ? `
    <div class="card">

            <div style="font-size:11.5px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap;">
              <span>♥ ${fmt(p.likeCount)}</span><span>💬 ${fmt(p.commentsCount)}</span>
              ${p.impressions!=null?`<span>👁 ${fmt(p.impressions)}</span>`:''}
              ${p.saved!=null?`<span>🔖 ${fmt(p.saved)}</span>`:''}
            </div>

        </div>`).join('')}

  const warnings = [d.account_metrics_warning, d.media_warning].filter(Boolean);

  content.innerHTML = `

      <div class="card-title">@${d.igUsername} · Conectado via Instagram</div>

        <div class="ins-met"><div class="v">${fmt(reachTotal)}</div><div class="l">Alcance (período)</div></div>
        <div class="ins-met"><div class="v">${fmt(interactionsTotal)}</div><div class="l">Interações</div></div>
        <div class="ins-met"><div class="v">${engRate ? engRate+'%' : '—'}</div><div class="l">Engajamento</div></div>

async function submitPlanejamento() {

  const q5 = document.getElementById('q5')?.value?.trim() || 'Não informado';
  const errEl = document.getElementById('quiz-err');

  if (errEl) errEl.style.display = 'none';

  quizAnswers = {
    tempo_gravacoes: q1, responsavel_conteudo: q2, perfis_referencia: q3,

      <div class="inline-load"><div class="inline-spinner"></div><span>Criando planejamento personalizado com IA OnFeX… (pode levar até 3 minutos)</span></div>

function renderCalDay(day) {
  const d = calendarData.find(x => x.dia === day);
  if (!d) return;
  document.getElementById('cal-content').innerHTML = `
    <div class="cal-feed">
      <div class="cal-feed-label">📍 Feed do dia</div>
      <span class="formato-tag">${d.feed.formato}</span>
      <div class="cal-pauta">${d.feed.pauta}</div>
      <div class="cal-hook">"${d.feed.hook}"</div>
    </div>
    <div class="cal-stories">
      <div class="cal-stories-label">Stories (3x)</div>
      ${(d.stories||[]).map((s,i) => `<div class="story-pill"><div class="story-num">${i+1}</div><span>${s}</span></div>`).join('')}
    </div>`;
  document.querySelectorAll('.cal-tab').forEach(t => t.classList.toggle('active', parseInt(t.dataset.day) === day));
  document.getElementById('cal-prev').disabled = day <= 1;
  document.getElementById('cal-next').disabled = day >= calendarData.length;
  const active = document.querySelector('.cal-tab.active');
  if (active) active.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}
function goToCalDay(day) { currentCalDay = day; renderCalDay(day); }
function navCalDay(delta) { const n = currentCalDay + delta; if (n >= 1 && n <= calendarData.length) { currentCalDay = n; renderCalDay(n); } }

    alert('Navegue até Entrega Final para exportar o relatório completo.');

  const opt = {
    margin: [10, 12, 10, 12],
    filename: `diagnostico-onfex-${handle}.pdf`,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, backgroundColor: '#060810', useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };
  html2pdf().set(opt).from(el).save();
}
